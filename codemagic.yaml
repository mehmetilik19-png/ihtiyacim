workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter pub get
      - cd ios && pod install
      - flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - build/ios/iphoneos/*.app

    publishing:
      email:
        recipients:
          - mehmetilik19@gmail.com
